<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Socket Test</title>
</head>

<body>

    <h1>DLS Socket.IO Test</h1>

    <p id="connectionStatus">
        Waiting for socket connection...
    </p>

    <h2>Realtime Question Events</h2>

    <section id="eventsList">
    </section>

    <!-- Socket.IO client script served automatically by the Socket.IO server -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        /*
            SOCKET TEST CLIENT
            Connect to backend Socket.IO server and listen for events.
        */

        const socket = io();

        const connectionStatus =
            document.getElementById("connectionStatus");

        const eventsList =
            document.getElementById("eventsList");


        /*
            CONNECT EVENT
            Runs when browser connects to Socket.IO server.
        */
        socket.on("connect", function () {
            connectionStatus.textContent =
                `Connected to server. Socket ID: ${socket.id}`;
        });


        /*
            SERVER WELCOME EVENT
            Sent from socket.manager.js after connection.
        */
        socket.on("server:welcome", function (data) {
            addEventToPage("server:welcome", data);
        });


        /*
            QUESTION CREATED EVENT
            Should appear after POST /api/questions in Postman.
        */
        socket.on("question:created", function (question) {
            addEventToPage("question:created", question);
        });


        /*
            ADD EVENT TO PAGE
            Simple visual log.
        */
        function addEventToPage(eventName, data) {
            const eventBox = document.createElement("article");

            eventBox.innerHTML = `
                <h3>${eventName}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
                <hr>
            `;

            eventsList.prepend(eventBox);
        }
    </script>

</body>

</html>
